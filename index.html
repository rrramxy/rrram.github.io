<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hot-Site - 探索技术、AI、游戏、音乐和体育的无限可能。精选优质内容，涵盖前沿技术、人工智能、游戏开发、音乐创作与艺术创意。">
    <meta name="keywords" content="技术博客,AI人工智能,游戏开发,音乐创作,艺术创意,前端开发">
    <meta name="author" content="Hot-Site">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Hot-Site - 首页">
    <meta property="og:description" content="探索技术、AI、游戏、音乐和体育的无限可能">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rrramxy.github.io/hot-site/">
    
    <title>Hot-Site | 首页</title>
    
    <!-- 样式 -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 字体预加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%236366f1'/><rect x='10' y='10' width='12' height='12' rx='2' fill='white' transform='rotate(45 16 16)'/></svg>">
</head>
<body data-page="home">
    <!-- 导航栏 -->
    <nav class="navbar" role="navigation" aria-label="主导航">
        <div class="nav-container">
            <a href="index.html" class="nav-logo" aria-label="返回首页">
                <div class="logo-icon" aria-hidden="true"></div>
                <span>Hot-Site</span>
            </a>
            
            <button class="hamburger" aria-label="打开菜单" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <button class="nav-search-btn" aria-label="搜索文章">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
            
            <ul class="nav-menu" role="menubar">
                <li role="none"><a href="index.html" class="nav-link active" role="menuitem">首页</a></li>
                <li role="none"><a href="category.html?cat=tech" class="nav-link" role="menuitem">技术</a></li>
                <li role="none"><a href="category.html?cat=ai" class="nav-link" role="menuitem">AI</a></li>
                <li role="none"><a href="category.html?cat=game" class="nav-link" role="menuitem">游戏</a></li>
                <li role="none"><a href="category.html?cat=music" class="nav-link" role="menuitem">音乐</a></li>
                <li role="none"><a href="category.html?cat=sports" class="nav-link" role="menuitem">体育</a></li>
                <li role="none"><a href="category.html?cat=news" class="nav-link" role="menuitem">新闻</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <header class="hero">
        <div class="hero-bg" aria-hidden="true"></div>
        <div class="hero-content">
            <h1 class="hero-title">
                探索<span class="gradient-text">无限可能</span>
            </h1>
            <p class="hero-subtitle">
                在技术、AI、游戏、音乐和体育的交汇处，发现新的灵感与洞见
            </p>
            <div class="hero-cta">
                <a href="#featured" class="btn btn-primary">开始探索</a>
                <a href="category.html?cat=all" class="btn btn-secondary">浏览全部</a>
            </div>
        </div>
        <div class="hero-decoration" aria-hidden="true">
            <div class="geo-shape geo-1"></div>
            <div class="geo-shape geo-2"></div>
            <div class="geo-shape geo-3"></div>
        </div>
    </header>

    <!-- 精选内容 -->
    <main>
        <section id="featured" class="section" aria-labelledby="featured-title">
            <div class="container">
                <header class="section-header">
                    <h2 id="featured-title" class="section-title">精选内容</h2>
                    <p class="section-subtitle">最新发布的优质文章与灵感</p>
                </header>
                
                <div class="article-grid" id="featured-grid" role="feed" aria-label="精选文章列表">
                    <!-- 文章卡片将通过 JS 动态加载 -->
                </div>
            </div>
        </section>

        <!-- 分类导航 -->
        <section class="section categories-section" aria-labelledby="categories-title">
            <div class="container">
                <header class="section-header">
                    <h2 id="categories-title" class="section-title">探索分类</h2>
                    <p class="section-subtitle">深入你感兴趣的领域</p>
                </header>
                
                <div class="category-grid" id="category-grid" role="list">
                    <!-- 分类卡片将通过 JS 动态生成 -->
                </div>
            </div>
        </section>
    </main>

    <!-- 搜索模态框 -->
    <div class="search-modal" role="dialog" aria-label="搜索">
        <div class="search-modal-content">
            <div class="search-input-wrapper">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="搜索文章标题或摘要..." 
                    aria-label="搜索关键词"
                    autocomplete="off"
                />
                <kbd class="search-shortcut">ESC</kbd>
            </div>
            <div class="search-results" id="search-results">
                <!-- 搜索结果将通过 JS 动态渲染 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <div class="logo-icon" aria-hidden="true"></div>
                    <span>Hot-Site</span>
                </div>
                <p class="footer-desc">探索技术、AI、游戏、音乐、体育和新闻的无限可能</p>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Hot-Site. 基于静态站点技术构建</p>
                <div class="footer-links">
                    <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="#">关于</a>
                    <a href="#">联系</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
